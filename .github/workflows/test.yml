name: Test

on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ringfence-test -f tests/Dockerfile .
      - name: Run tests
        run: docker run --rm --privileged ringfence-test

  test-separate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pm: [npm, pnpm, yarn, bun]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ringfence-test -f tests/Dockerfile .
      - name: Run tests for ${{ matrix.pm }}
        run: docker run --rm --privileged ringfence-test pnpm run test -- --test-name-pattern='${{ matrix.pm }}:'
